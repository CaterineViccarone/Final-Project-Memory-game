<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game</title>
    <link rel="stylesheet" href="styles.css">
    <script>
        const symbols = ['🍎', '🍌', '🍇', '🍉', '🍊', '🍓', '🍍', '🍒'];
        let cardSymbols = [...symbols, ...symbols];  // Create pairs

        let flippedCards = [];
        let matchedPairs = 0;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function initGame() {
            const cardContainer = document.getElementById('card-container');
            shuffle(cardSymbols);
            cardSymbols.forEach((symbol) => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.symbol = symbol;
                card.innerText = '?';
                card.addEventListener('click', flipCard);
                cardContainer.appendChild(card);
            });
        }

        function flipCard() {
            if (flippedCards.length < 2 && !this.classList.contains('matched')) {
                this.innerText = this.dataset.symbol;
                this.classList.add('flipped');
                flippedCards.push(this);
            }
            if (flippedCards.length === 2) {
                setTimeout(compareCards, 1000);
            }
        }

        function compareCards() {
            const [firstCard, secondCard] = flippedCards;
            if (firstCard.dataset.symbol === secondCard.dataset.symbol) {
                firstCard.classList.add('matched');
                secondCard.classList.add('matched');
                matchedPairs++;
                if (matchedPairs === symbols.length) {
                    setTimeout(() => alert('You matched all pairs!'), 500);
                }
            } else {
                firstCard.innerText = '?';
                secondCard.innerText = '?';
                firstCard.classList.remove('flipped');
                secondCard.classList.remove('flipped');
            }
            flippedCards = [];
        }

        window.onload = initGame;
    </script>
    <style>
        body { font-family: Arial, sans-serif; }
        #card-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .card { width: 100px; height: 100px; display: flex; align-items: center; justify-content: center; font-size: 2em; background-color: #f0f0f0; cursor: pointer; }
        .card.flipped { background-color: #d0f0c0; }
        .card.matched { background-color: #90ee90; }
    </style>
</head>
<body>
    <h1>Memory Game</h1>
    <div id="card-container"></div>
</body>
</html>
