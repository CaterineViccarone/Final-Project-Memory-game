<div id="timer" style="font-size: 24px; margin-bottom: 20px;">Time: 00:00</div>
<script>
  let timerInterval;
  let secondsElapsed = 0;

  function startTimer() {
      secondsElapsed = 0;
      document.getElementById("timer").innerText = "Time: 00:00";
      timerInterval = setInterval(() => {
          secondsElapsed++;
          const minutes = Math.floor(secondsElapsed / 60);
          const seconds = secondsElapsed % 60;
          document.getElementById("timer").innerText = `Time: ${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
      }, 1000);
  }

  function stopTimer() {
      clearInterval(timerInterval);
  }

  // Call startTimer() when the first card is flipped
  // Stop the timer when all pairs are matched
</script>
